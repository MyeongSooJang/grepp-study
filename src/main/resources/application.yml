spring:
  config:
    import: optional:file:.env[.properties]
  batch:
    job:
      enabled: false
  application:
    name: backend5-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:backend5}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
      schema-locations: classpath:org/springframework/batch/core/schema-postgresql.sql
      continue-on-error: true
  kafka:
    enabled: false  # Kafka 자동 시작 비활성화 (Kafka 서버 없을 때 연결 에러 방지)
  elasticsearch:
    uris: http://localhost:9200

# 로그 레벨 설정 (로그 출력 양 조절)
logging:
  level:
    root: INFO  # 전체 애플리케이션 기본 로그 레벨
    org.hibernate.SQL: WARN  # Hibernate SQL 쿼리 로그 숨김 (WARN 이상만 출력)
    org.hibernate.type.descriptor.sql.BasicBinder: WARN  # SQL 파라미터 바인딩 로그 숨김
    org.springframework.cloud: WARN  # Spring Cloud (Eureka, Config) 로그 줄임
    org.apache.kafka: WARN  # Kafka 관련 로그 줄임 (연결 실패 로그 등)
    com.netflix.discovery: ERROR  # Eureka 관련 로그 숨김 (ERROR만 출력)
    com.netflix.eureka: ERROR  # Eureka 관련 로그 숨김
    com.grepp.jms.greppstudy: INFO  # 우리 애플리케이션 로그는 INFO 레벨로 출력
    org.springframework.data.elasticsearch: DEBUG  # Elasticsearch 쿼리 로그
    tracer: TRACE  # Elasticsearch 요청/응답 로그

eureka:
  client:
    enabled: false  # Eureka Client 완전 비활성화

#eureka:
