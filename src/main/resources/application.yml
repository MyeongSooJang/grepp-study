#    fetch-registry: true # 외부 검색 가능
#    service-url:
#      defaultZone: http://admin:admin@${eureka.instance.hostname:localhost}:8761/eureka

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

payment:
  toss:
    secret-key: ${TOSS_PAYMENT_SECRET}

# JWT 토큰 생성/검증에 사용할 RSA 키 설정 (.env 파일에서 읽어옴)
jwt:
  private-key: ${PRIVATE_KEY}  # JWT 토큰 서명용 개인키
  public-key: ${PUBLIC_KEY}    # JWT 토큰 검증용 공개키

